<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おすすめコース診断</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      padding: 28px 32px;
      text-align: center;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .header p  { font-size: 0.9rem; opacity: 0.85; }

    .progress-bar-wrap {
      background: rgba(255,255,255,0.3);
      border-radius: 8px;
      height: 8px;
      margin-top: 16px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #fff;
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    .card {
      padding: 36px 32px;
    }

    .step-label {
      font-size: 0.78rem;
      color: #9b59b6;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .question {
      font-size: 1.25rem;
      font-weight: 700;
      color: #2c3e50;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      padding: 14px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: #fafafa;
      color: #2c3e50;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .choice-btn:hover {
      border-color: #764ba2;
      background: #f3eafd;
      color: #764ba2;
      transform: translateX(4px);
    }

    /* Result */
    .result-card {
      padding: 36px 32px;
      text-align: center;
    }
    .result-icon { font-size: 4rem; margin-bottom: 16px; }
    .result-title {
      font-size: 0.85rem;
      color: #9b59b6;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .result-job {
      font-size: 2rem;
      font-weight: 800;
      color: #2c3e50;
      margin-bottom: 16px;
    }
    .result-course {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .result-desc {
      color: #555;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .restart-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }
    .restart-btn:hover { opacity: 0.85; }

    .back-btn {
      display: block;
      background: none;
      border: none;
      color: #999;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 20px;
      text-align: center;
      font-family: inherit;
    }
    .back-btn:hover { color: #555; }

    /* Course color themes */
    .course-game    { background:#fde8ff; color:#9b3cbf; }
    .course-it      { background:#e8f0ff; color:#2a5dbf; }
    .course-biz     { background:#e8fff0; color:#1a8c54; }
    .course-public  { background:#fff8e8; color:#b07d00; }
    .course-medical { background:#ffe8e8; color:#c0291e; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ====================================================
//  Decision Tree Definition
// ====================================================
const tree = {

              choices: [
                { label: '興味あり', next: {

                  choices: [

                  choices: [

              choices: [
                { label: 'あまりない', next: {
                  result: { job: '独立経営者', course: 'ビジネスライセンス系', cls: 'course-biz',

                { label: 'ある', next: {

            }},
          ]

      ]
    }},
    { label: '抵抗なし', next: {
      id: 'q12',
      q: '正確さ・ルール重視の作業は平気ですか？',
      choices: [
        { label: '平気ではありません', next: {
          id: 'q13',
          q: 'パソコンや仕組み作りが好きですか？',
          choices: [
            { label: '好き', next: {
              id: 'q14',
              q: '自分でコード（プログラム）を書くことに興味はありますか？',
              choices: [
                { label: '興味あり', next: {
                  id: 'q15',
                  q: 'ゲームは好きですか？',
                  choices: [
                    { label: '好き', next: {
                      result: { job: 'ゲームプログラマー', course: 'ゲーム・CG・デザイン系', cls: 'course-game',

                    }},
                    { label: 'あまり好きではない', next: {
                      result: { job: 'プログラマー', course: '情報IT系', cls: 'course-it',

                    }},
                  ]
                }},
                { label: 'あまり興味はない', next: {
                  result: { job: 'システムエンジニア', course: '情報IT系', cls: 'course-it',
                    icon: '⚙️',
                    desc: 'システムの設計・要件定義・管理を担当するITのまとめ役。論理的思考が重要です。' }
                }},
              ]
            }},
            { label: 'あまり好きではない', next: {
              result: { job: 'システムエンジニア', course: '情報IT系', cls: 'course-it',
                icon: '⚙️',
                desc: 'システムの設計・要件定義・管理を担当するITのまとめ役。論理的思考が重要です。' }
            }},
          ]
        }},
        { label: '平気です', next: {
          id: 'q16',
          q: '法律と税金のどちらの制度に興味がありますか？',
          choices: [
            { label: '税金', next: {
              id: 'q17',
              q: 'チャレンジ精神はありますか？',
              choices: [
                { label: 'ある', next: {
                  result: { job: '税理士', course: 'ビジネスライセンス系', cls: 'course-biz',

                }},
                { label: 'あまりない', next: {
                  result: { job: '一般企業の経理職', course: 'ビジネスライセンス系', cls: 'course-biz',
                    icon: '📒',

                }},
              ]
            }},
            { label: '法律', next: {
              id: 'q18',
              q: 'プレッシャーには強い方ですか？',
              choices: [
                { label: '強い', next: {
                  result: { job: '公認会計士', course: 'ビジネスライセンス系', cls: 'course-biz',
                    icon: '⚖️',
                    desc: '企業の監査・財務諸表の証明を行う日本三大国家資格のひとつ。高収入が期待できます。' }
                }},
                { label: '弱い', next: {
                  result: { job: '一般企業の経理職', course: 'ビジネスライセンス系', cls: 'course-biz',
                    icon: '📒',
                    desc: '企業の会計・財務を管理する縁の下の力持ち。安定としっかりした基礎が活かせます。' }
                }},
              ]
            }},
          ]
        }},
      ]
    }},
  ]
};

// ====================================================
//  App Logic
// ====================================================
const app = document.getElementById('app');
let history = []; // stack of visited nodes

function countDepth(node) {
  if (node.result) return 0;
  let max = 0;
  for (const c of node.choices) {
    const d = countDepth(c.next);
    if (d > max) max = d;
  }
  return max + 1;
}

const MAX_DEPTH = countDepth(tree);

function stepNumber() { return history.length + 1; }

function render(node) {
  app.innerHTML = '';

  if (node.result) {
    renderResult(node.result);
    return;
  }

  const progress = Math.round((history.length / MAX_DEPTH) * 100);

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'header';
  hdr.innerHTML = `
    <h1>おすすめコース診断</h1>
    <p>質問に答えてあなたにぴったりのコースを見つけよう</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${progress}%"></div>
    </div>
  `;
  app.appendChild(hdr);

  // Card
  const card = document.createElement('div');
  card.className = 'card';

  const stepLbl = document.createElement('div');
  stepLbl.className = 'step-label';
  stepLbl.textContent = `質問 ${stepNumber()} / ${MAX_DEPTH}`;
  card.appendChild(stepLbl);

  const qEl = document.createElement('div');
  qEl.className = 'question';
  qEl.textContent = node.q;
  card.appendChild(qEl);

  const choices = document.createElement('div');
  choices.className = 'choices';

  node.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.label;
    btn.addEventListener('click', () => {
      history.push(node);
      render(choice.next);
    });
    choices.appendChild(btn);
  });

  card.appendChild(choices);

  if (history.length > 0) {
    const back = document.createElement('button');
    back.className = 'back-btn';
    back.textContent = '← 前の質問に戻る';
    back.addEventListener('click', () => {
      render(history.pop());
    });
    card.appendChild(back);
  }

  app.appendChild(card);
}

function renderResult(result) {
  // Header
  const hdr = document.createElement('div');
  hdr.className = 'header';
  hdr.innerHTML = `
    <h1>診断結果</h1>
    <p>あなたにおすすめのコースが見つかりました！</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:100%"></div>
    </div>
  `;
  app.appendChild(hdr);

  const rc = document.createElement('div');
  rc.className = 'result-card';

  rc.innerHTML = `
    <div class="result-icon">${result.icon}</div>
    <div class="result-title">おすすめの仕事</div>
    <div class="result-job">${result.job}</div>
    <span class="result-course ${result.cls}">${result.course}</span>
    <p class="result-desc">${result.desc}</p>
    <button class="restart-btn" id="restart-btn">もう一度診断する</button>
  `;

  if (history.length > 0) {
    const back = document.createElement('button');
    back.className = 'back-btn';
    back.textContent = '← 前の質問に戻る';
    back.addEventListener('click', () => {
      render(history.pop());
    });
    rc.appendChild(back);
  }

  app.appendChild(rc);

  document.getElementById('restart-btn').addEventListener('click', () => {
    history = [];
    render(tree);
  });
}

// Start
render(tree);
</script>
</body>
</html>
